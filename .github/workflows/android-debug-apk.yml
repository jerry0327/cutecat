name: Build Android Debug APK

on:
  push:
    branches: [main, master, 'chatgpt/**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Create game art assets
        run: |
          pip install pillow
          python tools/generate_assets.py
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug
      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/cutecat-debug.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 14
